<?xml version="1.0" encoding="UTF-8"?>
<!-- Lé Vibe app icon — hicolor scalable; matches editor code-icon (docs/brand-assets.md). -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 100 100" role="img" aria-labelledby="le-vibe-icon-title">
