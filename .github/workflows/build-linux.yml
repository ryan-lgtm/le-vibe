# STEP 14 — Linux IDE build entrypoint (alias). Delegates to build-le-vibe-ide.yml.
# Out-of-band .deb: same scope as build-le-vibe-ide.yml — no le-vibe-deb (ci.yml stack) or le-vibe-ide_*.deb upload; maintainer — packaging/scripts/build-le-vibe-ide-deb.sh / build-le-vibe-debs.sh --with-ide (§7.3; Full-product install on success — docs/PM_DEB_BUILD_ITERATION.md; docs/apt-repo-releases.md IDE package).
# Use this name in docs/PM when “build-linux” is the expected workflow label.
# Same job summary as the reusable workflow: open the run → Summary tab for ./editor/smoke.sh parity + skip reasons.
# Inherits build-le-vibe-ide.yml: ide-ci-metadata.txt, upload-artifact retention-days, permissions (contents read + actions write), Summary Pre-binary artifact / LE_VIBE_EDITOR.
# Optional: forward vscodium_linux_compile to run job linux_compile (14.e) — same flag as build-le-vibe-ide workflow_dispatch.
# Authority: docs/vscodium-fork-le-vibe.md, editor/README.md.
# E1: le-vibe/tests/test_product_spec_section8.py — PRODUCT_SPEC *Prioritization* ↔ same gate as build-le-vibe-ide.yml.
# Master orchestrator: 0 -> 1 -> 14 -> 2-13 -> 15-17 — docs/PROMPT_BUILD_LE_VIBE.md (ORDERED WORK QUEUE, Rolling iteration); docs/PM_STAGE_MAP.md (Execution order / STEP 16).
name: build-linux

on:
  workflow_dispatch:
    inputs:
      vscodium_linux_compile:
        type: boolean
        description: Run full VSCodium linux_compile job (forwards to build-le-vibe-ide) — long run
        default: false

jobs:
  le-vibe-ide:
    uses: ./.github/workflows/build-le-vibe-ide.yml
    with:
      vscodium_linux_compile: ${{ github.event.inputs.vscodium_linux_compile == 'true' }}
