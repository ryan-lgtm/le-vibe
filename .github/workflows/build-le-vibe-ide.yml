# STEP 14 (H6): Lé Vibe IDE — Linux build placeholder. Honest until editor/ is vendored
# (VSCodium / Code OSS). Authority: docs/vscodium-fork-le-vibe.md, editor/README.md,
# docs/PRODUCT_SPEC.md §7.2, *Prioritization* (./editor/smoke.sh), spec-phase2.md §14.
# E1: le-vibe/tests/test_product_spec_section8.py (PRODUCT_SPEC sequencing vs this gate).
# 14.e: optional job linux_compile runs packaging/scripts/ci-vscodium-linux-dev-build.sh (upstream dev/build.sh).
name: build-le-vibe-ide

on:
  workflow_dispatch:
    inputs:
      vscodium_linux_compile:
        type: boolean
        description: Run full VSCodium compile (editor/vscodium ./dev/build.sh) — long; may OOM on small runners
        default: false
  workflow_call:
    inputs:
      vscodium_linux_compile:
        type: boolean
        description: When true, run job linux_compile (same as manual dispatch flag) — long; may OOM on small runners
        default: false
  pull_request:
    branches: [main, master]
    paths:
      - ".gitmodules"
      - "editor/**"
      - ".github/workflows/build-le-vibe-ide.yml"
      - ".github/workflows/build-linux.yml"
      - "packaging/scripts/ci-editor-gate.sh"
      - "packaging/scripts/ci-editor-nvmrc-sync.sh"
      - "packaging/scripts/ci-vscodium-bash-syntax.sh"
      - "packaging/scripts/ci-vscodium-linux-dev-build.sh"
  push:
    tags:
      - "ide-v*"

concurrency:
  group: ide-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# checkout + upload-artifact — avoid over-broad default GITHUB_TOKEN scopes (H8-adjacent hygiene).
permissions:
  contents: read
  actions: write

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Gate — upstream sources present
        id: gate
        run: |
          set -euo pipefail
          if [ -f editor/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "layout=flat" >> "$GITHUB_OUTPUT"
            echo "editor/: vscode-style package.json found (flat layout) — build steps can be wired here."
          elif [ -f editor/vscodium/product.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "layout=vscodium" >> "$GITHUB_OUTPUT"
            echo "editor/vscodium/: VSCodium tree found (product.json) — vscode sources follow get_repo.sh; see upstream build docs."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::editor/ is not vendored yet. Skipping compile; see editor/VENDORING.md and docs/vscodium-fork-le-vibe.md."
          fi

      - name: Smoke (when sources exist)
        if: steps.gate.outputs.present == 'true'
        run: |
          set -euo pipefail
          if [ "${{ steps.gate.outputs.layout }}" = "flat" ]; then
            cd editor
            python3 -c "import json; p=json.load(open('package.json')); print('editor package:', p.get('name','(unnamed)'))"
          else
            cd editor/vscodium
            python3 -c "import json; u=json.load(open('upstream/stable.json')); print('pinned vscode tag:', u.get('tag','?'))"
          fi
          cd "${GITHUB_WORKSPACE}"
          ./packaging/scripts/ci-vscodium-bash-syntax.sh
          ./packaging/scripts/ci-editor-nvmrc-sync.sh
          echo "Full upstream compile is job **linux_compile** (14.e) — opt-in via workflow_dispatch (vscodium_linux_compile), workflow_call (e.g. build-linux.yml), or ide-v* tag push; not pull_request. See this workflow file."

      - name: Job summary — local smoke parity
        if: steps.gate.outputs.present == 'true'
        run: |
          {
            echo "## Lé Vibe IDE (STEP 14 / H6)"
            echo "Default smoke — **no full compile** on pull_request. Optional job **linux_compile** runs \`editor/vscodium/dev/build.sh\` (manual dispatch flag \`vscodium_linux_compile\` or \`ide-v*\` tag push)."
            echo ""
            echo "**Local parity:** from the repository root run \`./editor/smoke.sh\` (same gate as this job and \`build-linux.yml\`, which \`uses:\` this workflow)."
            echo ""
            echo "**Pre-binary artifact:** \`ide-ci-metadata.txt\` includes \`le_vibe_editor_docs=editor/README.md\` — stack \`LE_VIBE_EDITOR\` docs pointer (see \`editor/README.md\`)."
            echo ""
            echo "Docs: \`editor/README.md\`, \`docs/ci-qa-hardening.md\` (*IDE smoke*), \`docs/vscodium-fork-le-vibe.md\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: CI metadata artifact (pre-binary)
        if: steps.gate.outputs.present == 'true'
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "layout=${{ steps.gate.outputs.layout }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "le_vibe_editor_docs=editor/README.md"
          } > artifacts/ide-ci-metadata.txt
          if [ -f editor/vscodium/upstream/stable.json ]; then
            cp editor/vscodium/upstream/stable.json artifacts/vscode-upstream-stable.json
          fi

      - name: Upload CI metadata
        if: steps.gate.outputs.present == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: le-vibe-ide-ci-metadata-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 90

      - name: Skip summary
        if: steps.gate.outputs.present != 'true'
        run: |
          echo "IDE build skipped — vendor upstream (editor/package.json flat, or editor/vscodium with VSCodium); see editor/VENDORING.md."
          {
            echo "## Lé Vibe IDE (STEP 14 / H6)"
            echo "Skipped — no \`editor/package.json\` (flat) or \`editor/vscodium/product.json\`."
            echo "See \`editor/VENDORING.md\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # Full upstream compile (14.e) — opt-in: manual dispatch flag, workflow_call inputs, or ide-v* tag push (not PRs).
  linux_compile:
    # workflow_dispatch uses github.event.inputs; workflow_call uses inputs.* (boolean). Omit on pull_request.
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.vscodium_linux_compile == 'true')
      || (github.event_name == 'workflow_call' && inputs.vscodium_linux_compile == true)
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/ide-v'))
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    # Match editor/vscodium/dev/build.sh (export NODE_OPTIONS=--max-old-space-size=8192).
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Gate — VSCodium tree
        id: gate
        run: |
          set -euo pipefail
          if [ ! -f editor/vscodium/product.json ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::error::editor/vscodium missing — init submodule for compile job."
            exit 1
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      # Same gates as default linux smoke + ci-editor-gate — fail before fetch/compile (14.a / 14.e).
      - name: Fail-fast editor gates (bash -n + .nvmrc sync)
        run: |
          set -euo pipefail
          ./packaging/scripts/ci-vscodium-bash-syntax.sh
          ./packaging/scripts/ci-editor-nvmrc-sync.sh

      # Subset of editor/vscodium/docs/howto-build.md *Dependencies* → *Linux* (dpkg/rpm/python 3.11 headers).
      - name: Install Linux build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxkbfile-dev \
            libsecret-1-dev \
            libkrb5-dev \
            fakeroot \
            dpkg-dev \
            rpm \
            jq \
            librsvg2-bin \
            git \
            python3 \
            python3.11-dev \
            curl \
            ca-certificates

      - uses: actions/setup-node@v4
        with:
          node-version-file: editor/.nvmrc

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust (vscode native modules)
        uses: dtolnay/rust-toolchain@stable

      # H6: speed up repeat linux_compile runs — vscode/ ripgrep and other crates download into ~/.cargo.
      - name: Cache Cargo registry (linux_compile)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-le-vibe-linux_compile-cargo-${{ hashFiles('editor/vscodium/product.json', 'editor/.nvmrc') }}
          restore-keys: |
            ${{ runner.os }}-le-vibe-linux_compile-cargo-

      - name: Full VSCodium linux build (dev/build.sh)
        run: ./packaging/scripts/ci-vscodium-linux-dev-build.sh

      - name: Collect linux output tree
        id: out
        run: |
          set -euo pipefail
          shopt -s nullglob
          dirs=(editor/vscodium/VSCode-linux-*)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "::warning::No VSCode-linux-* directory after build — artifact step may skip."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "dir=${dirs[0]}" >> "$GITHUB_OUTPUT"

      - name: Pack VSCode-linux artifact
        if: steps.out.outputs.found == 'true'
        env:
          OUTDIR: ${{ steps.out.outputs.dir }}
        run: |
          set -euo pipefail
          tar -C "$(dirname "${OUTDIR}")" -czf vscodium-linux-build.tar.gz "$(basename "${OUTDIR}")"

      - name: Upload compile artifact
        if: steps.out.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: le-vibe-vscodium-linux-${{ github.run_id }}
          path: vscodium-linux-build.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Job summary — compile
        if: always()
        run: |
          {
            echo "## Lé Vibe IDE — full linux compile (14.e)"
            echo "Fail-fast (same as \`ci-editor-gate\`): \`ci-vscodium-bash-syntax.sh\` + \`ci-editor-nvmrc-sync.sh\` before compile."
            echo "Upstream entrypoint: \`editor/vscodium/dev/build.sh\` via \`packaging/scripts/ci-vscodium-linux-dev-build.sh\`."
            echo "Toolchain (14.a): **actions/setup-node** uses \`node-version-file: editor/.nvmrc\` (parity with \`editor/vscodium/.nvmrc\` — \`ci-editor-nvmrc-sync.sh\`). Job \`env.NODE_OPTIONS\` matches \`dev/build.sh\` (\`--max-old-space-size=8192\`)."
            echo "Optional compile env (14.d): \`editor/le-vibe-overrides/build-env.sh\` (copy from \`build-env.sh.example\`) is sourced before \`dev/build.sh\` — **§7.2** for material branding."
            echo "Trigger: **workflow_dispatch** \`vscodium_linux_compile\`, **workflow_call** \`inputs.vscodium_linux_compile\` (e.g. \`build-linux.yml\`), or push tag \`ide-v*\`."
            echo "Artifact (when \`VSCode-linux-*\` exists): \`vscodium-linux-build.tar.gz\` → \`actions/upload-artifact\` name \`le-vibe-vscodium-linux-<run_id>\` (**retention-days** on that upload)."
            echo "After download: GitHub wraps the file in a **.zip** — unzip, then resolve \`bin/codium\` with \`./editor/print-ci-tarball-codium-path.sh /path/to/vscodium-linux-build.tar.gz\` (**14.f**). Local tree under \`editor/vscodium/\`: \`./editor/verify-14c-local-binary.sh\` (**14.c** parity, no Ollama)."
            echo "PRs keep the fast smoke job only — no compile on pull_request."
          } >> "$GITHUB_STEP_SUMMARY"
