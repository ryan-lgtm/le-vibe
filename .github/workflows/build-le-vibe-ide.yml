# STEP 14 (H6): Lé Vibe IDE — Linux build placeholder. Honest until editor/ is vendored
# (VSCodium / Code OSS). Authority: docs/vscodium-fork-le-vibe.md, editor/README.md,
# docs/PRODUCT_SPEC.md §7.2, *Prioritization* (./editor/smoke.sh), spec-phase2.md §14.
# E1: le-vibe/tests/test_product_spec_section8.py (PRODUCT_SPEC sequencing vs this gate).
name: build-le-vibe-ide

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main, master]
    paths:
      - ".gitmodules"
      - "editor/**"
      - ".github/workflows/build-le-vibe-ide.yml"
      - ".github/workflows/build-linux.yml"
      - "packaging/scripts/ci-editor-gate.sh"
      - "packaging/scripts/ci-editor-nvmrc-sync.sh"
      - "packaging/scripts/ci-vscodium-bash-syntax.sh"
  push:
    tags:
      - "ide-v*"

concurrency:
  group: ide-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Gate — upstream sources present
        id: gate
        run: |
          set -euo pipefail
          if [ -f editor/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "layout=flat" >> "$GITHUB_OUTPUT"
            echo "editor/: vscode-style package.json found (flat layout) — build steps can be wired here."
          elif [ -f editor/vscodium/product.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "layout=vscodium" >> "$GITHUB_OUTPUT"
            echo "editor/vscodium/: VSCodium tree found (product.json) — vscode sources follow get_repo.sh; see upstream build docs."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::editor/ is not vendored yet. Skipping compile; see editor/VENDORING.md and docs/vscodium-fork-le-vibe.md."
          fi

      - name: Smoke (when sources exist)
        if: steps.gate.outputs.present == 'true'
        run: |
          set -euo pipefail
          if [ "${{ steps.gate.outputs.layout }}" = "flat" ]; then
            cd editor
            python3 -c "import json; p=json.load(open('package.json')); print('editor package:', p.get('name','(unnamed)'))"
          else
            cd editor/vscodium
            python3 -c "import json; u=json.load(open('upstream/stable.json')); print('pinned vscode tag:', u.get('tag','?'))"
          fi
          cd "${GITHUB_WORKSPACE}"
          ./packaging/scripts/ci-vscodium-bash-syntax.sh
          ./packaging/scripts/ci-editor-nvmrc-sync.sh
          echo "TODO: wire VSCodium prepare/build here (see upstream get_repo.sh / build.sh)."

      - name: Job summary — local smoke parity
        if: steps.gate.outputs.present == 'true'
        run: |
          {
            echo "## Lé Vibe IDE (STEP 14 / H6)"
            echo "Smoke checks only — **no Electron compile** in CI yet."
            echo ""
            echo "**Local parity:** from the repository root run \`./editor/smoke.sh\` (same gate as this job and \`build-linux.yml\`, which \`uses:\` this workflow)."
            echo ""
            echo "**Pre-binary artifact:** \`ide-ci-metadata.txt\` includes \`le_vibe_editor_docs=editor/README.md\` — stack \`LE_VIBE_EDITOR\` docs pointer (see \`editor/README.md\`)."
            echo ""
            echo "Docs: \`editor/README.md\`, \`docs/ci-qa-hardening.md\` (*IDE smoke*), \`docs/vscodium-fork-le-vibe.md\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: CI metadata artifact (pre-binary)
        if: steps.gate.outputs.present == 'true'
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "layout=${{ steps.gate.outputs.layout }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "le_vibe_editor_docs=editor/README.md"
          } > artifacts/ide-ci-metadata.txt
          if [ -f editor/vscodium/upstream/stable.json ]; then
            cp editor/vscodium/upstream/stable.json artifacts/vscode-upstream-stable.json
          fi

      - name: Upload CI metadata
        if: steps.gate.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: le-vibe-ide-ci-metadata-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error

      - name: Skip summary
        if: steps.gate.outputs.present != 'true'
        run: |
          echo "IDE build skipped — vendor upstream (editor/package.json flat, or editor/vscodium with VSCodium); see editor/VENDORING.md."
          {
            echo "## Lé Vibe IDE (STEP 14 / H6)"
            echo "Skipped — no \`editor/package.json\` (flat) or \`editor/vscodium/product.json\`."
            echo "See \`editor/VENDORING.md\`."
          } >> "$GITHUB_STEP_SUMMARY"
