# Epic N16 task-n16-1: continuous verification for the first-party Lé Vibe Chat extension
# (npm ci + npm run verify in editor/le-vibe-native-extension). Linux-only; no Ollama required.
name: Lé Vibe native extension verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: levibe-native-ext-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: editor/le-vibe-native-extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: editor/le-vibe-native-extension/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      - name: Verify (tests + smoke)
        run: npm run verify
