name: Feature request
description: Suggest an improvement to Lé Vibe packaging or launcher
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. **Lé Vibe** (é) — packaging and launcher scope here unless the request clearly spans upstream **VSCodium**, **Continue**, or **Ollama**.

        **Must-ship requirements:** **`docs/PRODUCT_SPEC.md`** (incl. **§8**, **§7.2**). **E1 regression evidence:** **`docs/PRODUCT_SPEC_SECTION8_EVIDENCE.md`**. **Full authority roster:** **`docs/PRODUCT_SPEC.md` §9**. **STEP → PM doc:** **`docs/PM_STAGE_MAP.md`**. **Master queue:** **`docs/PROMPT_BUILD_LE_VIBE.md`**. **This issue form:** Roadmap **H8** — **`docs/PM_STAGE_MAP` STEP 12** (product surface / **`.github/`** — **`ci.yml`**, **`dependabot.yml`**, **`ISSUE_TEMPLATE/`** + **`config.yml`** **`#` H8**). **`.deb` installs:** **`/usr/share/doc/le-vibe/README.Debian`** (source **`debian/le-vibe.README.Debian`**) — **Phase 2 scope** (**`docs/spec-phase2.md` §14**). **Optional RAG / embeddings (non-canonical):** **`docs/rag/le-vibe-phase2-chunks.md`** — **`spec-phase2.md` §14**; **`SECURITY.md`** *Related docs*. **Privacy:** **`docs/privacy-and-telemetry.md`** (*E1 contract tests* — root **`README`** *Tests* / **`le-vibe/tests/`**). **Security-sensitive** packaging or supply-chain topics: **`SECURITY.md`** (root).
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow or limitation are you trying to address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Ideas welcome; maintainers may scope or split work.
    validations:
      required: false
